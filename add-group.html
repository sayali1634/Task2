<!DOCTYPE html>
<html>
<head>
  <title>Add Group</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
  <h3>Invoice</h3>
  <a href="Dashboard.html">Dashboard</a>
  <a href="add-group.html" class="active">Manage Groups</a>
  <a href="manage-change.html">Manage Chains</a>
  <a href="#">Manage Brands</a>
</div>

<!-- Main Content -->
<div class="main">

  <!-- Topbar -->
  <div class="topbar">
    <div><b>Invoice</b> | Add Group</div>
    <div>Hi User | Logout</div>
  </div>

  <!-- Card Form -->
  <div class="card">
    <h2>Add New Group</h2>

    <input id="group" placeholder="Enter Group Name">
    
    <button class="btn add" onclick="add()">Add Group</button>

    <p id="msg"></p>
  </div>

</div>

<script>
const API="http://localhost:5000";

async function add(){
  const group_name=document.getElementById("group").value.trim();
  const msg=document.getElementById("msg");

  if(!group_name){
    msg.innerText="⚠️ Group name required";
    msg.style.color="red";
    return;
  }

  const res = await fetch(API+"/groups",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({group_name})
  });

  const data = await res.json();

  if(!res.ok){
    msg.innerText = data.message;
    msg.style.color = "red";
  } else {
    msg.innerText = "✅ Group Added Successfully";
    msg.style.color = "green";
    document.getElementById("group").value="";
  }
}
</script>

</body>
</html>
