<!DOCTYPE html>
<html>
<head>
  <title>Manage Groups</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      background: #f8f9fa;
    }

    /* Sidebar */
    .sidebar {
      width: 220px;
      background: #fff;
      padding: 20px;
      border-right: 1px solid #ddd;
      height: 100vh;
    }

    .sidebar h3 {
      margin-bottom: 20px;
    }

    .sidebar a {
      display: block;
      margin: 10px 0;
      text-decoration: none;
      color: #007bff;
    }

    .sidebar a.active {
      font-weight: bold;
    }

    /* Main */
    .main {
      flex: 1;
      padding: 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      background: #e9ecef;
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 10px;
    }

    label {
      font-weight: bold;
    }

    input {
      width: 300px;
      padding: 8px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    .btn {
      margin-top: 10px;
      padding: 8px 15px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .alert {
      margin-top: 15px;
      padding: 10px;
      width: 320px;
      border-radius: 4px;
      display: none;
    }

    .alert-error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .alert-success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

  </style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
  <h3>Invoice</h3>
  <a href="Dashboard.html">Dashboard</a>
  <a href="#" class="active">Manage Groups</a>
  <a href="#">Manage Chain</a>
  <a href="#">Manage Brands</a>
  <a href="#">Manage SubZones</a>
  <a href="#">Manage Estimate</a>
  <a href="#">Manage Invoices</a>
</div>

<!-- Main Content -->
<div class="main">

  <!-- Header -->
  <div class="header">
    <div><b>Invoice</b> | Manage Group Section</div>
    <div>Hi User | Logout</div>
  </div>

  <!-- Form -->
  <div class="form-group">
    <label>Enter Group Name:</label><br>
    <input type="text" id="groupName" placeholder="Enter Unique Group Name">
  </div>

  <button class="btn" onclick="addGroup()">Add Group</button>

  <!-- Alert -->
  <div id="alertBox" class="alert"></div>

</div>

<script>
const API = "http://localhost:5000/groups";

async function addGroup() {
  const name = document.getElementById("groupName").value.trim();
  const alertBox = document.getElementById("alertBox");

  // Empty validation
  if (!name) {
    showAlert("Group name cannot be empty!", "error");
    return;
  }

  try {
    const res = await fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name })
    });

    const data = await res.json();

    if (!res.ok) {
      showAlert(data.message, "error");
    } else {
      showAlert("Group added successfully!", "success");
      document.getElementById("groupName").value = "";
    }

  } catch (err) {
    showAlert("Server error!", "error");
  }
}

// Show Alert
function showAlert(message, type) {
  const alertBox = document.getElementById("alertBox");

  alertBox.style.display = "block";
  alertBox.className = "alert " + (type === "error" ? "alert-error" : "alert-success");
  alertBox.innerText = message;
}
</script>

</body>
</html>
