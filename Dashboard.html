<!DOCTYPE html>
<html>
<head>
  <title>Group Dashboard</title>
  <style>
    body { margin:0; font-family: Arial; display:flex; background:#f4f6f9; }
    
    /* Sidebar */
    .sidebar {
      width: 220px;
      background:#fff;
      padding:20px;
      border-right:1px solid #ddd;
      height:100vh;
    }
    .sidebar h3 { margin-bottom:20px; }
    .sidebar a { display:block; margin:10px 0; text-decoration:none; color:#007bff; }
    .sidebar a.active { font-weight:bold; }

    /* Main */
    .main { flex:1; padding:20px; }
    .topbar { display:flex; justify-content:space-between; margin-bottom:20px; }

    /* Cards */
    .cards { display:flex; margin-bottom:20px; }
    .card { background:#007bff; color:#fff; padding:15px; margin-right:15px; border-radius:5px; width:150px; text-align:center; }
    .card h4 { margin:0; }

    /* Buttons */
    .btn { padding:6px 10px; border:none; border-radius:4px; cursor:pointer; margin-right:5px; }
    .btn-add { background:green; color:white; }
    .btn-edit { background:orange; color:white; }
    .btn-delete { background:red; color:white; }

    /* Table */
    table { width:100%; border-collapse:collapse; margin-top:20px; }
    th, td { border-bottom:1px solid #ccc; padding:10px; text-align:left; }
    .inactive { color:red; }

    input { padding:8px; width:250px; margin-right:5px; }
  </style>
</head>
<body>

<div class="sidebar">
  <h3>Invoice</h3>
  <a href="Dashboard.html" class="active">Dashboard</a>
  <a href="add-group.html">Manage Groups</a>
  <a href="#">Manage Chain</a>
  <a href="#">Manage Brands</a>
</div>

<div class="main">
  <div class="topbar">
    <h2>Group Dashboard</h2>
    <div>Hi User | Logout</div>
  </div>

  <div class="cards">
    <div class="card">
      <h4>Total Groups</h4>
      <h2 id="totalGroups">0</h2>
    </div>
  </div>

  <div>
    <input type="text" id="groupName" placeholder="Enter group name">
    <button class="btn btn-add" onclick="addGroup()">Add Group</button>
    <p id="error" style="color:red;"></p>
  </div>

  <table>
    <thead>
      <tr>
        <th>Sr.</th>
        <th>Group Name</th>
        <th>Status</th>
        <th>Edit</th>
        <th>Toggle Active</th>
      </tr>
    </thead>
    <tbody id="groupTable"></tbody>
  </table>
</div>

<script>
const API = "http://localhost:5000/groups";

// Load groups
async function loadGroups() {
  const res = await fetch(API);
  const data = await res.json();

  const table = document.getElementById("groupTable");
  table.innerHTML = "";
  document.getElementById("totalGroups").innerText = data.length;

  data.forEach((g, i) => {
    table.innerHTML += `
      <tr>
        <td>${i+1}</td>
        <td class="${g.is_active ? '' : 'inactive'}">${g.group_name}</td>
        <td>${g.is_active ? 'Active' : 'Inactive'}</td>
        <td><button class="btn btn-edit" onclick="editGroup(${g.group_id}, '${g.group_name}')">Edit</button></td>
        <td><button class="btn btn-delete" onclick="toggleGroup(${g.group_id})">${g.is_active ? 'Deactivate' : 'Activate'}</button></td>
      </tr>
    `;
  });
}

// Add group
async function addGroup() {
  const name = document.getElementById("groupName").value.trim();
  const error = document.getElementById("error");
  if (!name) { error.innerText="Group name required"; return; }

  const res = await fetch(API, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({group_name:name})});
  const data = await res.json();
  if (!res.ok) { error.innerText=data.message; } 
  else { error.innerText=""; document.getElementById("groupName").value=""; loadGroups(); }
}

// Edit group
async function editGroup(id, oldName) {
  const newName = prompt("Enter new name", oldName);
  if (!newName || !newName.trim()) return;

  const res = await fetch(`${API}/${id}`, { method:"PUT", headers:{"Content-Type":"application/json"}, body:JSON.stringify({group_name:newName}) });
  loadGroups();
}

// Toggle Active (soft delete)
// Toggle Active (soft delete)
async function toggleGroup(id) {
  try {
    const res = await fetch(`${API}/${id}/toggle`, { method: "PATCH" });
    const data = await res.json();

    // Find the row in table
    const tableRows = document.querySelectorAll("#groupTable tr");
    tableRows.forEach(row => {
      const btn = row.querySelector(".btn-delete");
      const statusCell = row.cells[2]; // Status column
      const nameCell = row.cells[1];   // Group name column

      if (btn && btn.onclick.toString().includes(`toggleGroup(${id})`)) {
        if (data.is_active) {
          btn.innerText = "Deactivate";
          statusCell.innerText = "Active";
          nameCell.classList.remove("inactive");
        } else {
          btn.innerText = "Activate";
          statusCell.innerText = "Inactive";
          nameCell.classList.add("inactive");
        }
      }
    });
  } catch (err) {
    alert("Error updating status");
  }
}

loadGroups();
</script>

</body>
</html>
